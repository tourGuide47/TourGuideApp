<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل الدخول | TourGuide Ghardaia</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar"><div class="container"><a href="index.html" class="navbar-brand"><div class="logo-icon">🏛️</div><span>TourGuide <strong>Ghardaia</strong></span></a><div class="navbar-auth" id="navbar-auth" style="position:relative;"></div></div></nav>

  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-header">
        <div class="auth-icon">🔑</div>
        <h1>تسجيل الدخول</h1>
        <p class="subtitle">مرحباً بعودتك! سجل دخولك لاستكشاف غرداية</p>
      </div>
      <form id="login-form" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="email">البريد الإلكتروني</label>
          <input type="email" id="email" class="form-control" placeholder="example@email.com" required>
        </div>
        <div class="form-group">
          <label for="password">كلمة المرور</label>
          <input type="password" id="password" class="form-control" placeholder="أدخل كلمة المرور" required>
        </div>
        <div id="login-error" class="form-error" style="display:none;margin-bottom:12px;"></div>
        <button type="submit" class="btn btn-primary" style="width:100%;" id="login-btn">🔓 تسجيل الدخول</button>
      </form>
      <div class="auth-link">ليس لديك حساب؟ <a href="signup.html">إنشاء حساب جديد</a></div>
      <div style="margin-top:20px;padding-top:16px;border-top:1px solid var(--border-light);text-align:center;">
        <p style="color:var(--text-muted);font-size:0.8rem;margin-bottom:8px;">حساب تجريبي:</p>
        <code style="font-size:0.8rem;color:var(--text-secondary);">ahmed@example.com / user123</code>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    async function handleLogin(e) {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errEl = document.getElementById('login-error');
      const btn = document.getElementById('login-btn');
      btn.disabled = true; btn.textContent = '⏳ جاري التحميل...';
      errEl.style.display = 'none';
      try {
        const data = await apiFetch('/auth/login', { method: 'POST', body: JSON.stringify({ email, password }) });
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        showToast('تم تسجيل الدخول بنجاح 🎉', 'success');
        setTimeout(() => window.location.href = 'index.html', 800);
      } catch (err) {
        errEl.textContent = err.message; errEl.style.display = 'block';
        btn.disabled = false; btn.textContent = '🔓 تسجيل الدخول';
      }
    }
  </script>
</body>
</html>
