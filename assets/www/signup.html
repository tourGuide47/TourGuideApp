<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>إنشاء حساب | TourGuide Ghardaia</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar"><div class="container"><a href="index.html" class="navbar-brand"><div class="logo-icon">🏛️</div><span>TourGuide <strong>Ghardaia</strong></span></a><div class="navbar-auth" id="navbar-auth" style="position:relative;"></div></div></nav>

  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-header">
        <div class="auth-icon">🌟</div>
        <h1>إنشاء حساب</h1>
        <p class="subtitle">أنشئ حسابك واستمتع بتجربة سياحية متكاملة</p>
      </div>
      <form id="signup-form" onsubmit="handleSignup(event)">
        <div class="form-group">
          <label for="name">الاسم الكامل</label>
          <input type="text" id="name" class="form-control" placeholder="أدخل اسمك" required>
        </div>
        <div class="form-group">
          <label for="email">البريد الإلكتروني</label>
          <input type="email" id="email" class="form-control" placeholder="example@email.com" required>
        </div>
        <div class="form-group">
          <label for="role">نوع الحساب</label>
          <select id="role" class="form-control" style="background-image: none; cursor: pointer;">
            <option value="tourist">🗺️ سائح (Tourist)</option>
            <option value="hotel_owner">🏨 صاحب فندق (Hotel Owner)</option>
            <option value="restaurant_owner">🍽️ صاحب مطعم (Restaurant Owner)</option>
          </select>
        </div>
        <div class="form-group">
          <label for="password">كلمة المرور</label>
          <input type="password" id="password" class="form-control" placeholder="6 أحرف على الأقل" required minlength="6">
        </div>
        <div class="form-group">
          <label for="password2">تأكيد كلمة المرور</label>
          <input type="password" id="password2" class="form-control" placeholder="أعد إدخال كلمة المرور" required>
        </div>
        <div id="signup-error" class="form-error" style="display:none;margin-bottom:12px;"></div>
        <button type="submit" class="btn btn-primary" style="width:100%;" id="signup-btn">✨ إنشاء الحساب</button>
      </form>
      <div class="auth-link">لديك حساب بالفعل؟ <a href="login.html">تسجيل الدخول</a></div>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    async function handleSignup(e) {
      e.preventDefault();
      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const role = document.getElementById('role').value;
      const password = document.getElementById('password').value;
      const password2 = document.getElementById('password2').value;
      const errEl = document.getElementById('signup-error');
      const btn = document.getElementById('signup-btn');

      if (password !== password2) { errEl.textContent = 'كلمتا المرور غير متطابقتين'; errEl.style.display = 'block'; return; }

      btn.disabled = true; btn.textContent = '⏳ جاري الإنشاء...';
      errEl.style.display = 'none';
      try {
        const data = await apiFetch('/auth/signup', { method: 'POST', body: JSON.stringify({ name, email, password, role }) });
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        showToast('تم إنشاء الحساب بنجاح 🎉', 'success');
        setTimeout(() => window.location.href = 'index.html', 800);
      } catch (err) {
        errEl.textContent = err.message; errEl.style.display = 'block';
        btn.disabled = false; btn.textContent = '✨ إنشاء الحساب';
      }
    }
  </script>
</body>
</html>
