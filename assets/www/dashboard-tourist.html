<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحتي الخاصة | TourGuide Ghardaia</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;600;700&display=swap">
  <style>
    body { background-color: #f8fafc; }
    .dashboard-container { max-width: 1200px; margin: 2rem auto; padding: 0 1.5rem; }
    .page-header { margin-bottom: 2.5rem; display: flex; flex-direction: column; gap: 0.5rem; }
    .page-title { font-size: 2rem; font-weight: 800; color: #1e293b; font-family: 'Outfit', sans-serif; }
    
    .dashboard-tabs { display: flex; gap: 1rem; margin-bottom: 2rem; border-bottom: 1px solid #e2e8f0; padding-bottom: 1rem; overflow-x: auto; }
    .tab-btn { padding: 0.75rem 1.5rem; border-radius: 0.75rem; border: none; background: transparent; color: #64748b; font-weight: 600; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
    .tab-btn:hover { color: var(--primary); }
    .tab-btn.active { background: white; color: var(--primary); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
    
    .grid-4 { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; }
    .info-card { background: white; border-radius: 1.25rem; padding: 2rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; text-align: center; }
    .info-icon { font-size: 2.5rem; margin-bottom: 1rem; }
    .info-count { font-size: 2.5rem; font-weight: 800; color: var(--primary); margin-bottom: 0.5rem; display: block; }
    .info-label { color: #64748b; font-weight: 500; }
    
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    
    .review-mini-card { background: white; border-radius: 1rem; padding: 1.5rem; border: 1px solid #e2e8f0; margin-bottom: 1rem; }
    .review-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem; }
    .reply-badge { background: #dcfce7; color: #166534; padding: 0.2rem 0.6rem; border-radius: 0.5rem; font-size: 0.75rem; font-weight: 600; }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="navbar-container">
      <a href="index.html" class="logo">🏜️ TourGuide <span>Ghardaia</span></a>
      <div id="auth-area"></div>
    </div>
  </nav>

  <div class="dashboard-container">
    <header class="page-header">
      <h1 class="page-title">لوحتي السياحية</h1>
      <p style="color: #64748b;">مرحباً بك مجدداً، استكشف نشاطاتك وحجوزاتك في وادي ميزاب.</p>
    </header>

    <div class="grid-4" style="margin-bottom: 3rem;">
      <div class="info-card">
        <div class="info-icon">🗺️</div>
        <span class="info-count" id="stat-trips">0</span>
        <span class="info-label">رحلات مخططة</span>
      </div>
      <div class="info-card">
        <div class="info-icon">❤️</div>
        <span class="info-count" id="stat-favs">0</span>
        <span class="info-label">أماكن مفضلة</span>
      </div>
      <div class="info-card">
        <div class="info-icon">📅</div>
        <span class="info-count" id="stat-bookings">0</span>
        <span class="info-label">حجوزات مؤكدة</span>
      </div>
      <div class="info-card">
        <div class="info-icon">⭐</div>
        <span class="info-count" id="stat-reviews">0</span>
        <span class="info-label">مراجعات منشورة</span>
      </div>
    </div>

    <div class="dashboard-tabs">
      <button class="tab-btn active" onclick="switchTab('trips')">🗺️ رحلاتي</button>
      <button class="tab-btn" onclick="switchTab('bookings')">📅 حجوزاتي</button>
      <button class="tab-btn" onclick="switchTab('favorites')">❤️ المفضلة</button>
      <button class="tab-btn" onclick="switchTab('reviews')">⭐ تقييماتي</button>
    </div>

    <div id="tab-trips" class="tab-content active">
      <div id="trips-grid" class="grid-4">
        <!-- Load trips -->
      </div>
    </div>

    <div id="tab-bookings" class="tab-content">
      <div id="bookings-grid" class="grid-4">
        <!-- Load bookings -->
      </div>
    </div>

    <div id="tab-favorites" class="tab-content">
      <div id="favorites-grid" class="grid-4">
        <!-- Load favorites -->
      </div>
    </div>

    <div id="tab-reviews" class="tab-content">
      <div id="reviews-list" style="max-width: 800px;">
        <!-- Load reviews -->
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script src="js/dashboard-tourist.js"></script>
  <script>
    if (!isLoggedIn()) window.location.href = 'login.html';
    updateNavbar();
  </script>
</body>
</html>
