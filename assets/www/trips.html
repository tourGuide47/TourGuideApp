<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>رحلاتي | TourGuide Ghardaia</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar"><div class="container">
    <a href="index.html" class="navbar-brand"><div class="logo-icon">🏛️</div><span>TourGuide <strong>Ghardaia</strong></span></a>
    <div class="navbar-links" id="nav-links">
      <a href="index.html">🏠 الرئيسية</a><a href="trips.html" class="active">🗺️ رحلاتي</a><a href="favorites.html">❤️ المفضلة</a>
      <a href="notifications.html">🔔 الإشعارات <span class="badge" id="notif-badge" style="display:none">0</span></a>
    </div>
    <div class="navbar-auth" id="navbar-auth" style="position:relative;"></div>
    <button class="mobile-menu-btn" onclick="toggleMobileMenu()">☰</button>
  </div></nav>

  <div class="page-header"><div class="container"><h1>🗺️ رحلاتي</h1><p>خطّط لرحلاتك واستكشف غرداية بأفضل طريقة</p></div></div>

  <section class="section">
    <div class="container">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:32px;">
        <h2 style="font-size:1.3rem;">رحلاتك المحفوظة</h2>
        <button class="btn btn-primary" onclick="showNewTripModal()">➕ رحلة جديدة</button>
      </div>
      <div id="trips-container"><div class="loader"><div class="spinner"></div></div></div>
    </div>
  </section>

  <!-- New Trip Modal -->
  <div class="modal-overlay" id="trip-modal">
    <div class="modal">
      <h2>🗺️ رحلة جديدة</h2>
      <div class="form-group"><label>اسم الرحلة</label><input type="text" id="trip-name" class="form-control" placeholder="مثال: جولة في وادي ميزاب"></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <div class="form-group"><label>تاريخ البداية</label><input type="date" id="trip-start" class="form-control"></div>
        <div class="form-group"><label>تاريخ النهاية</label><input type="date" id="trip-end" class="form-control"></div>
      </div>
      <div class="form-group"><label>ملاحظات</label><textarea id="trip-notes" class="form-control" placeholder="ملاحظات اختيارية..." rows="2"></textarea></div>
      <div class="form-group"><label>اختر الأماكن</label><div id="places-checklist" style="max-height:200px;overflow-y:auto;border:1px solid var(--border);border-radius:var(--radius-md);padding:12px;"></div></div>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="closeTripModal()">إلغاء</button>
        <button class="btn btn-primary" onclick="createTrip()">✨ إنشاء الرحلة</button>
      </div>
    </div>
  </div>

  <footer class="footer"><div class="container"><div class="footer-bottom"><p>© 2024 TourGuide Ghardaia. جميع الحقوق محفوظة.</p></div></div></footer>
  <script src="js/app.js"></script>
  <script src="js/trips.js"></script>
</body>
</html>
